<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .container {
      background: #1e293b;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 960px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,.5);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 24px;
      color: #f8fafc;
      letter-spacing: -0.02em;
    }

    .add-form {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .add-form input {
      flex: 1 1 200px;
      padding: 10px 14px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color .2s;
    }

    .add-form input:focus { border-color: #3b82f6; }

    .add-form input::placeholder { color: #64748b; }

    .add-form button {
      padding: 10px 24px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s;
      white-space: nowrap;
    }

    .add-form button:hover { background: #2563eb; }

    .layout {
      display: flex;
      gap: 24px;
      align-items: flex-start;
    }

    .list-section {
      flex: 2;
      min-width: 0;
    }

    .summary {
      flex: 1;
      min-width: 200px;
      background: #0f172a;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      position: sticky;
      top: 16px;
    }

    .summary-label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .summary-total {
      font-size: 2rem;
      font-weight: 700;
      color: #f8fafc;
    }

    .summary-count {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 8px;
    }

    .empty-msg {
      text-align: center;
      color: #64748b;
      padding: 32px 16px;
    }

    .expense-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #0f172a;
      border-radius: 8px;
      margin-bottom: 8px;
      gap: 12px;
    }

    .expense-info {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1;
    }

    .expense-name {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .expense-amount {
      color: #94a3b8;
      white-space: nowrap;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background .2s;
      line-height: 1;
      flex-shrink: 0;
    }

    .delete-btn:hover { background: #450a0a; }

    @media (max-width: 640px) {
      .container { padding: 16px; }
      .layout { flex-direction: column; }
      .summary { position: static; width: 100%; }
      .add-form input { flex: 1 1 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Expense Tracker</h1>

    <form class="add-form" id="addForm">
      <input type="text" id="nameInput" placeholder="Expense name" required autocomplete="off">
      <input type="number" id="amountInput" placeholder="Amount (₦)" min="0" step="0.01" required>
      <button type="submit">Add Expense</button>
    </form>

    <div class="layout">
      <div class="list-section" id="listSection">
        <div class="empty-msg" id="emptyMsg">No expenses added yet</div>
        <div id="expenseList"></div>
      </div>

      <div class="summary">
        <div class="summary-label">Total</div>
        <div class="summary-total" id="totalDisplay">₦0.00</div>
        <div class="summary-count" id="countDisplay">0 items</div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('addForm');
    const nameInput = document.getElementById('nameInput');
    const amountInput = document.getElementById('amountInput');
    const expenseList = document.getElementById('expenseList');
    const emptyMsg = document.getElementById('emptyMsg');
    const totalDisplay = document.getElementById('totalDisplay');
    const countDisplay = document.getElementById('countDisplay');

    let expenses = [];

    function formatNaira(amount) {
      return '₦' + Number(amount).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function render() {
      expenseList.innerHTML = '';

      if (expenses.length === 0) {
        emptyMsg.style.display = 'block';
      } else {
        emptyMsg.style.display = 'none';
      }

      let total = 0;

      expenses.forEach((expense, index) => {
        total += expense.amount;

        const div = document.createElement('div');
        div.className = 'expense-item';

        div.innerHTML = `
          <div class="expense-info">
            <span class="expense-name">${escapeHtml(expense.name)}</span>
            <span class="expense-amount">${formatNaira(expense.amount)}</span>
          </div>
          <button class="delete-btn" data-index="${index}" aria-label="Delete expense">&times;</button>
        `;

        expenseList.appendChild(div);
      });

      totalDisplay.textContent = formatNaira(total);
      countDisplay.textContent = `${expenses.length} item${expenses.length !== 1 ? 's' : ''}`;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const name = nameInput.value.trim();
      const amount = parseFloat(amountInput.value);

      if (!name || isNaN(amount) || amount < 0) return;

      expenses.push({ name, amount });
      render();
      form.reset();
      nameInput.focus();
    });

    expenseList.addEventListener('click', function(e) {
      const btn = e.target.closest('.delete-btn');
      if (!btn) return;
      const index = parseInt(btn.dataset.index);
      expenses.splice(index, 1);
      render();
    });
  </script>
</body>
</html>
